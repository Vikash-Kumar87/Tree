version: "3.9"

services:

  # ─── Backend API ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: treemeasure-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/weights:/app/weights:ro
      - ./backend/firebase-adminsdk.json:/app/firebase-adminsdk.json:ro
    environment:
      - ENV=production
      - DEVICE=cpu
      - LOG_LEVEL=INFO
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s   # Allow model loading time
    deploy:
      resources:
        limits:
          memory: 6G        # Increase for GPU inference
          cpus: "4"

  # ─── Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: treemeasure-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro      # Mount SSL certs for HTTPS

  # ─── Redis (result cache / rate limiting) ──────────────────────────────
  redis:
    image: "redis:7-alpine"
    container_name: treemeasure-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  # ─── Prometheus (metrics) ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: treemeasure-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles: ["monitoring"]    # Only starts with --profile monitoring

  # ─── Grafana (dashboards) ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: treemeasure-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    profiles: ["monitoring"]


volumes:
  redis_data:
  grafana_data:

networks:
  default:
    name: treemeasure-network
